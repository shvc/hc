apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.serviceName }}-pv1
  labels:
    type: local
spec:
  capacity:
    storage: 300Mi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  {{- if .Values.nfs.enabled }}
  nfs:
    path: {{ .Values.nfs.path }}
    server:  {{ .Values.nfs.server }}
  {{ else }}
  hostPath:
    path: {{ .Values.pvPath }}/{{ .Values.serviceName }}-pv1
    type: DirectoryOrCreate
  {{- end }}
